services:
  backend:
    build: ./backend
    container_name: mern_backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/intern_api
      - JWT_SECRET=supersecret12345
      - JWT_EXPIRE=30d
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - mern_net

  frontend:
    build: ./frontend
    container_name: mern_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - mern_net

  mongo:
    image: mongo:latest
    container_name: mern_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_net

  redis:
    image: redis:alpine
    container_name: mern_redis
    ports:
      - '6379:6379'
    networks:
      - mern_net

volumes:
  mongo_data:


networks:
  mern_net:
    driver: bridge
